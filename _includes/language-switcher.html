<!-- Language Switcher — sidebar pill -->

{% assign _is_default = false %}
{% if site.active_lang == site.default_lang %}
  {% assign _is_default = true %}
{% endif %}

<div class="lang-toggle d-inline-flex align-items-center" role="navigation" aria-label="Language switcher">
  <a
    href="{{ '/' | relative_url }}"
    class="lang-btn{% if _is_default %} active{% endif %}"
    aria-label="Switch to English"
    {% unless _is_default %}aria-current="false"{% endunless %}
  >
    <span class="lang-flag" aria-hidden="true">🇺🇸</span>
    <span class="lang-code">EN</span>
  </a>
  <a
    href="{{ '/pt-BR/' | relative_url }}"
    class="lang-btn{% unless _is_default %} active{% endunless %}"
    aria-label="Mudar para Português"
    {% unless _is_default %}aria-current="true"{% endunless %}
  >
    <span class="lang-flag" aria-hidden="true">🇧🇷</span>
    <span class="lang-code">PT</span>
  </a>
</div>

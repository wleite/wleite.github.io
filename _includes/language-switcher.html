<!-- Language Switcher — sidebar pill (JS-driven to bypass polyglot URL rewriting) -->

<div class="lang-toggle d-inline-flex align-items-center" role="navigation" aria-label="Language switcher">
  <button type="button" class="lang-btn" id="lang-btn-en" onclick="window.location.href='/'" aria-label="Switch to English">
    <span class="lang-flag" aria-hidden="true">🇺🇸</span>
    <span class="lang-code">EN</span>
  </button>
  <button type="button" class="lang-btn" id="lang-btn-pt" onclick="window.location.href='/pt-BR/'" aria-label="Mudar para Português">
    <span class="lang-flag" aria-hidden="true">🇧🇷</span>
    <span class="lang-code">PT</span>
  </button>
</div>

<script>
  (function () {
    var isPt = window.location.pathname.startsWith('/pt-BR');
    var enBtn = document.getElementById('lang-btn-en');
    var ptBtn = document.getElementById('lang-btn-pt');
    if (isPt) {
      ptBtn.classList.add('active');
    } else {
      enBtn.classList.add('active');
    }
  })();
</script>
